{% assign remark_host = site.comments.remark42.host | default: '' %}
{% assign remark_site_id = site.comments.remark42.site_id | default: site.github.username | default: site.title %}

{% if remark_host != empty %}
  <section class="remark42-comments" aria-labelledby="remark42-comments-title">
    <div class="remark42-comments-header">
      <h2 id="remark42-comments-title">댓글</h2>
      <p>궁금한 점, 피드백, 오류 제보를 남겨 주세요.</p>
    </div>

    <div id="remark42" class="remark42-comments-embed">댓글을 불러오는 중입니다.</div>
  </section>

  <script>
    (function () {
      function getRemarkTheme() {
        if (window.Theme && Theme.visualState) {
          return Theme.visualState === Theme.DARK ? 'dark' : 'light';
        }

        return window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      }

      function syncRemarkTheme() {
        if (window.REMARK42 && typeof window.REMARK42.changeTheme === 'function') {
          window.REMARK42.changeTheme(getRemarkTheme());
        }
      }

      function watchThemeChanges() {
        var mediaQuery;

        if (!window.matchMedia) {
          return;
        }

        mediaQuery = window.matchMedia('(prefers-color-scheme: dark)');

        if (typeof mediaQuery.addEventListener === 'function') {
          mediaQuery.addEventListener('change', syncRemarkTheme);
        } else if (typeof mediaQuery.addListener === 'function') {
          mediaQuery.addListener(syncRemarkTheme);
        }
      }

      function hasRemarkFrame() {
        var root = document.getElementById('remark42');

        return !!(root && root.querySelector('iframe'));
      }

      function loadRemarkComponent(component, attempt) {
        var script = document.createElement('script');
        var extension = '.js';
        var parent = document.head || document.body;
        var cacheKey = {{ site.time | date: '%s' | jsonify }};

        if ('noModule' in script) {
          script.type = 'module';
          extension = '.mjs';
        } else {
          script.defer = true;
        }

        script.async = true;
        script.src =
          window.remark_config.host +
          '/web/' +
          component +
          extension +
          '?v=' +
          cacheKey +
          (attempt > 0 ? '-' + attempt + '-' + Date.now() : '');
        script.onerror = function () {
          if (attempt < 2) {
            loadRemarkComponent(component, attempt + 1);
          }
        };
        parent.appendChild(script);
      }

      function retryRemarkEmbed() {
        if (hasRemarkFrame()) {
          return;
        }

        if (window.REMARK42 && typeof window.REMARK42.destroy === 'function') {
          window.REMARK42.destroy();
        }

        window.REMARK42 = undefined;
        loadRemarkComponent('embed', 1);
      }

      window.remark_config = {
        host: {{ remark_host | jsonify }},
        site_id: {{ remark_site_id | jsonify }},
        url: window.location.origin + window.location.pathname,
        components: ['embed'],
        theme: getRemarkTheme(),
        locale: {{ site.comments.remark42.locale | default: 'ko' | jsonify }},
        simple_view: {{ site.comments.remark42.simple_view | default: true | jsonify }},
        show_email_subscription: {{ site.comments.remark42.show_email_subscription | default: false | jsonify }},
        show_rss_subscription: {{ site.comments.remark42.show_rss_subscription | default: false | jsonify }},
        no_footer: {{ site.comments.remark42.no_footer | default: true | jsonify }}
      };

      window.addEventListener('message', function (event) {
        if (window.Theme && event.source === window && event.data && event.data.id === Theme.ID) {
          syncRemarkTheme();
        }
      });

      watchThemeChanges();

      (function (components) {
        for (var index = 0; index < components.length; index += 1) {
          loadRemarkComponent(components[index], 0);
        }

        window.setTimeout(retryRemarkEmbed, 3000);
        window.setTimeout(retryRemarkEmbed, 8000);
      })(window.remark_config.components || ['embed']);
    })();
  </script>
{% endif %}
