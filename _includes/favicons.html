{% capture favicon_path %}{{ '/assets/img/favicons' | relative_url }}{% endcapture %}
{% assign favicon_version = site.time | date: '%s' %}
{% assign avatar_path = site.avatar | relative_url %}

<link rel="icon" type="image/png" href="{{ avatar_path }}?v={{ favicon_version }}" sizes="512x512">
<link rel="shortcut icon" type="image/png" href="{{ avatar_path }}?v={{ favicon_version }}">
<link rel="apple-touch-icon" href="{{ avatar_path }}?v={{ favicon_version }}">
{% if site.pwa.enabled %}
  <link rel="manifest" href="{{ favicon_path }}/site.webmanifest">
{% endif %}
