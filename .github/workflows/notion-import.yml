name: Import Notion Posts

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  import:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Import posts from Notion
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          DATABASE_ID: ${{ secrets.DATABASE_ID }}
        run: node scripts/import-notion-posts.mjs

      - name: Commit imported posts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add _posts
          if [ -d assets/img/notion ]; then
            git add assets/img/notion
          fi
          if git diff --cached --quiet; then
            echo "No Notion changes to commit."
          else
            git commit -m "chore: import Notion posts"
            git push
            gh workflow run pages-deploy.yml --ref main
          fi
