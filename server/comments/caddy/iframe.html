<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <link href="remark.mjs" rel="modulepreload">
    <meta content="width=device-width,initial-scale=1" name="viewport">
    <title>Comments</title>
    <base target="_blank">
    <script>
      "?selfClose" === window.location.search && window.close(),
        function () {
          if ("undefined" == typeof window || (window.CSS && window.CSS.supports && window.CSS.supports("color", "var(--fake-var)"))) try {
            var o = JSON.parse(window.name).__colors__,
              t = document.documentElement;
            if (o) for (var e in o) e.startsWith("--") ? t.style.setProperty(e, o[e]) : console.info("Key " + e + " must start with `--`")
          } catch (o) {}
        }()
    </script>
    <link href="remark.css" rel="stylesheet">
  </head>
  <body>
    <div id="remark42">
      <div class="preloader preloader_view_iframe"></div>
    </div>

    <script>
      window.addEventListener("message", function (t) {
        try {
          const e = t.data;
          if (!("object" == typeof e && null !== e && !Array.isArray(e))) return;
          e.hash && 0 === e.hash.indexOf("#") && location.replace(e.hash), e.title && (document.title = e.title)
        } catch (t) {}
      });
      var remark_config = window.location.search.length < 2 ? {} : window.location.search.substring(1).split("&").reduce(function (t, e) {
        var n = e.split("=");
        return n[1] || (n[1] = ""), t[n[0]] = decodeURIComponent(n[1]), t
      }, {});
      window.parent.postMessage({ inited: !0 }, "*")
    </script>
    <script>
      (function () {
        function trimTimeSuffix() {
          document.querySelectorAll("a.G_M").forEach(function (node) {
            var text = node.textContent || "";
            if (/(\d|\uC624\uC804|\uC624\uD6C4)\uC5D0$/.test(text)) {
              node.textContent = text.slice(0, -1);
            }
          });
        }

        function updateCommentPlaceholder() {
          document.querySelectorAll("textarea").forEach(function (node) {
            var placeholder = node.getAttribute("placeholder") || "";
            if (placeholder === "여기에 댓글 입력" || placeholder === "댓글 입력") {
              node.setAttribute("placeholder", "댓글을 입력해주세요.");
            }
          });
        }

        function customizeRemarkUi() {
          trimTimeSuffix();
          updateCommentPlaceholder();
        }

        document.addEventListener("DOMContentLoaded", function () {
          customizeRemarkUi();
          new MutationObserver(customizeRemarkUi).observe(document.getElementById("remark42") || document.body, {
            childList: true,
            characterData: true,
            subtree: true
          });
        });
      })();
    </script>
    <script>
      !function (e) {
        var d = e.head || e.body,
          n = e.createElement("script"),
          r = "noModule" in n;
        n.src = "remark" + (r ? ".mjs" : ".js"), r && (n.type = "module"), n.async = !0, n.defer = !0, d.appendChild(n)
      }(document)
    </script>
  </body>
</html>
