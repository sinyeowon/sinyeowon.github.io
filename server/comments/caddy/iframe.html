<html>

          } catch (o) {}
        }()
    </script>

  <body>
    <div id="remark42">
      <div class="preloader preloader_view_iframe"></div>
    </div>

    <script>
      window.addEventListener("message", function (t) {
        try {
          const e = t.data;
          if (!("object" == typeof e && null !== e && !Array.isArray(e))) return;
          e.hash && 0 === e.hash.indexOf("#") && location.replace(e.hash), e.title && (document.title = e.title)
        } catch (t) {}
      });
      var remark_config = window.location.search.length < 2 ? {} : window.location.search.substring(1).split("&").reduce(function (t, e) {
        var n = e.split("=");

      }, {});
      window.parent.postMessage({ inited: !0 }, "*")
    </script>
    <script>
      (function () {
        var PENDING_COMMENT_KEY = "syw-remark-pending-comment";
        var AUTO_SUBMITTING_KEY = "syw-remark-auto-submitting";

        function storageGet(key) {
          try {
            return sessionStorage.getItem(key);
          } catch (error) {
            return null;
          }
        }

        function storageSet(key, value) {
          try {
            sessionStorage.setItem(key, value);
          } catch (error) {}
        }

        function storageRemove(key) {
          try {
            sessionStorage.removeItem(key);
          } catch (error) {}
        }

        function savePendingComment(value) {
          storageSet(PENDING_COMMENT_KEY, JSON.stringify({
            text: value,
            savedAt: Date.now()
          }));
        }

        function readPendingComment() {
          var raw = storageGet(PENDING_COMMENT_KEY);
          var pending;

          if (!raw) {
            return "";
          }

          try {
            pending = JSON.parse(raw);
          } catch (error) {
            storageRemove(PENDING_COMMENT_KEY);
            return "";
          }

          if (!pending.text || Date.now() - pending.savedAt > 10 * 60 * 1000) {
            storageRemove(PENDING_COMMENT_KEY);
            return "";
          }

          return pending.text;
        }

        function trimTimeSuffix() {
          document.querySelectorAll("a.G_M").forEach(function (node) {
            var text = node.textContent || "";
            if (/(\d|\uC624\uC804|\uC624\uD6C4)\uC5D0$/.test(text)) {
              node.textContent = text.slice(0, -1);
            }
          });
        }

        function updateCommentPlaceholder() {
          document.querySelectorAll("textarea").forEach(function (node) {
            var placeholder = node.getAttribute("placeholder") || "";
            if (placeholder === "여기에 댓글 입력" || placeholder === "댓글 입력") {
              node.setAttribute("placeholder", "댓글을 입력해주세요.");
            }
            if (!node.getAttribute("name")) {
              node.setAttribute("name", "comment");
            }
            if (!node.getAttribute("autocomplete")) {
              node.setAttribute("autocomplete", "off");
            }
          });
        }

        function hideMarkdownNotice() {
          document.querySelectorAll("a, span, div, p").forEach(function (node) {
            var text = (node.textContent || "").replace(/\s+/g, " ").trim();
            if (text === "Markdown을 사용한 스타일링 지원") {
              var container = node.closest(".K_J, .K_I, div") || node;
              container.classList.add("syw-hidden");
            }
          });
        }

        function renameAnonymousTitle() {
          document.querySelectorAll(".auth-form-title").forEach(function (title) {
            if ((title.textContent || "").trim().toLowerCase() === "anonymous") {
              title.textContent = "익명 이름 설정";
            }
          });
        }

        function hidePreviewButtons() {
          document.querySelectorAll("button").forEach(function (button) {
            if ((button.textContent || "").trim() === "미리보기") {
              button.classList.add("syw-hidden");
            }
          });
        }

        function hideDeletedComments() {
          var deletedCommentLabels = [
            "이 댓글은 삭제되었습니다",
            "This comment was deleted",
            "Deleted comment"
          ];
          var walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT);
          var textNode;

          while ((textNode = walker.nextNode())) {
            var text = (textNode.nodeValue || "").replace(/\s+/g, " ").trim();
            var parent;
            var comment;

            if (!deletedCommentLabels.some(function (label) { return text === label || text.indexOf(label) !== -1; })) {
              continue;
            }

            parent = textNode.parentElement;
            if (!parent || parent.closest("script, style, template")) {
              continue;
            }

            comment = parent.closest(".G_F, .G_W, .G_Z, .G_R, .G_Q, .L_A, .B_C");

            if (comment) {
              comment.classList.add("syw-deleted-comment-hidden");
            } else {
              parent.classList.add("syw-deleted-comment-hidden");
            }
          }
        }

        function setButtonLabel(button, className, label) {
          var labelNode;

          if (!button) {
            return;
          }

          labelNode = button.querySelector("." + className);
          if (!labelNode) {
            labelNode = document.createElement("span");
            labelNode.className = className;
            button.insertBefore(labelNode, button.firstChild);
          }

          if (labelNode.textContent !== label) {
            labelNode.textContent = label;
          }

          if (button.getAttribute("aria-label") !== label) {
            button.setAttribute("aria-label", label);
          }
        }

        function renameAuthControls() {
          document.querySelectorAll(".auth-button").forEach(function (button) {
            setButtonLabel(button, "syw-auth-label", "이름 설정");
          });

          document.querySelectorAll(".auth-submit").forEach(function (button) {
            if (!button.disabled) {
              setButtonLabel(button, "syw-auth-submit-label", "이 이름으로 남기기");
            }
          });

          document.querySelectorAll(".auth-input-username").forEach(function (input) {
            input.setAttribute("placeholder", "표시할 이름");
            input.setAttribute("aria-label", "표시할 이름");
            input.setAttribute("name", "username");
            input.setAttribute("autocomplete", "username");
          });
        }

        function getAuthButton() {
          var button = document.querySelector(".auth-button");
          if (!button) {
            button = document.querySelector('button[aria-label="이름 설정"]');
          }
          if (!button) {
            button = document.querySelector('button[aria-label="로그인"]');
          }
          // If no auth button, check if we're in anonymous mode by looking for the username input
          if (!button && document.querySelector(".auth-input-username")) {
            return { isAnonymous: true };
          }
          return button;
        }

        function getMainCommentForm() {
          var textarea = document.querySelector(".B_B textarea.K_F") || document.querySelector("textarea.K_F");
          return textarea ? textarea.closest("form, .K_A") : null;
        }

        function focusUsernameInput() {
          var input = document.querySelector(".auth-input-username");
          if (input) {
            input.focus();
            input.scrollIntoView({ behavior: 'smooth', block: 'center' });
          }
        }

        function openNameSetup() {
          var authButton = getAuthButton();
          var dropdown = document.querySelector(".auth-dropdown");

          if (!authButton) {
            return;
          }

          if (authButton.isAnonymous) {
            document.body.classList.add("syw-name-setup-open");
            focusUsernameInput();
            return;
          }

          document.body.classList.add("syw-name-setup-open");

          if (!dropdown) {
            authButton.click();
          }

          setTimeout(focusUsernameInput, 150);
        }

        function buildNameSetupPanel() {
          var panel = document.createElement("div");
          var button = document.createElement("button");

          panel.className = "syw-name-setup-panel";
          panel.dataset.sywNameSetupPanel = "true";
          button.type = "button";
          button.className = "syw-name-setup-button";
          button.textContent = "이름 설정하고 댓글 쓰기";
          button.addEventListener("click", openNameSetup);
          panel.appendChild(button);

          return panel;
        }

        function syncNameSetupPanel() {
          var authButton = getAuthButton();
          var mainForm = getMainCommentForm();
          var panel = document.querySelector("[data-syw-name-setup-panel]");
          var root = document.querySelector("#remark42 .B_A") || document.getElementById("remark42");
          var container;

          if (!root) {
            return;
          }

          // If there's no auth button AND no anonymous input field, the user is likely already logged in.
          if (!authButton) {
            if (panel) {
              panel.remove();
            }
            document.body.classList.remove("syw-name-setup-open");
            storageRemove(AUTO_SUBMITTING_KEY);
            storageRemove(PENDING_COMMENT_KEY);
            if (mainForm) {
              mainForm.classList.remove("syw-comment-form-awaiting-name");
            }
            return;
          }

          if (mainForm) {
            mainForm.classList.add("syw-comment-form-awaiting-name");
          }

          if (!panel) {
            panel = buildNameSetupPanel();
          }

          container = mainForm && mainForm.parentNode ? mainForm.parentNode : root;

          if (mainForm && (panel.parentNode !== container || panel.nextSibling !== mainForm)) {
            container.insertBefore(panel, mainForm);
          } else if (!mainForm && panel.parentNode !== container) {
            container.insertBefore(panel, container.firstChild);
          }
        }

        function escapeHtml(value) {
          return String(value || "")
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#39;");
        }

        function renderInlineMarkdown(value) {
          return escapeHtml(value)
            .replace(/`([^`]+)`/g, "<code>$1</code>")
            .replace(/\[([^\]]+)\]\((https?:\/\/[^)\s]+)\)/g, '<a href="$2" rel="nofollow noopener noreferrer">$1</a>')
            .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>")
            .replace(/\*([^*]+)\*/g, "<em>$1</em>");
        }

        function renderMarkdown(value) {
          var lines = String(value || "").split(/\r?\n/);
          var html = [];
          var inCode = false;
          var codeLines = [];
          var inList = false;
          var listType = "";

          function closeList() {
            if (inList) {
              html.push("</" + listType + ">");
              inList = false;
              listType = "";
            }
          }

          lines.forEach(function (line) {
            var headingMatch;
            var orderedMatch;
            var unorderedMatch;

            if (/^```/.test(line)) {
              if (inCode) {
                html.push("<pre><code>" + escapeHtml(codeLines.join("\n")) + "</code></pre>");
                codeLines = [];
                inCode = false;
              } else {
                closeList();
                inCode = true;
              }
              return;
            }

            if (inCode) {
              codeLines.push(line);
              return;
            }

            if (!line.trim()) {
              closeList();
              return;
            }

            headingMatch = /^(#{1,3})\s+(.+)$/.exec(line);
            if (headingMatch) {
              closeList();
              html.push("<h" + headingMatch[1].length + ">" + renderInlineMarkdown(headingMatch[2]) + "</h" + headingMatch[1].length + ">");
              return;
            }

            if (/^>\s?/.test(line)) {
              closeList();
              html.push("<blockquote>" + renderInlineMarkdown(line.replace(/^>\s?/, "")) + "</blockquote>");
              return;
            }

            unorderedMatch = /^\s*[-*+]\s+(.+)$/.exec(line);
            orderedMatch = /^\s*\d+\.\s+(.+)$/.exec(line);
            if (unorderedMatch || orderedMatch) {
              var nextListType = unorderedMatch ? "ul" : "ol";
              if (!inList || listType !== nextListType) {
                closeList();
                listType = nextListType;
                inList = true;
                html.push("<" + listType + ">");
              }
              html.push("<li>" + renderInlineMarkdown((unorderedMatch || orderedMatch)[1]) + "</li>");
              return;
            }

            closeList();
            html.push("<p>" + renderInlineMarkdown(line) + "</p>");
          });

          closeList();

          if (inCode) {
            html.push("<pre><code>" + escapeHtml(codeLines.join("\n")) + "</code></pre>");
          }

          return html.join("");
        }

        function dispatchTextInput(textarea) {
          textarea.dispatchEvent(new Event("input", { bubbles: true }));
          textarea.dispatchEvent(new Event("change", { bubbles: true }));
        }

        function insertMarkdown(textarea, before, after, placeholder) {
          var start = textarea.selectionStart || 0;
          var end = textarea.selectionEnd || 0;
          var value = textarea.value || "";
          var selected = value.slice(start, end) || placeholder || "";
          var next = before + selected + after;

          textarea.value = value.slice(0, start) + next + value.slice(end);
          textarea.focus();
          textarea.setSelectionRange(start + before.length, start + before.length + selected.length);
          dispatchTextInput(textarea);
        }

        function insertLinePrefix(textarea, prefix) {
          var start = textarea.selectionStart || 0;
          var end = textarea.selectionEnd || 0;
          var value = textarea.value || "";
          var lineStart = value.lastIndexOf("\n", start - 1) + 1;
          var selected = value.slice(lineStart, end);
          var next = selected
            .split("\n")
            .map(function (line) {
              return line ? prefix + line : prefix.trim();
            })
            .join("\n");

          textarea.value = value.slice(0, lineStart) + next + value.slice(end);
          textarea.focus();
          textarea.setSelectionRange(lineStart, lineStart + next.length);
          dispatchTextInput(textarea);
        }

        function buildToolbar(textarea, preview) {
          var toolbar = document.createElement("div");
          var actions = [
            ["heading", "AA", "제목"],
            ["bold", "B", "굵게"],
            ["italic", "i", "기울임"],
            ["quote", "“", "인용"],
            ["code", "<>", "코드"],
            ["link", "↗", "링크"],
            ["ul", "•", "목록"],
            ["ol", "1.", "번호 목록"]
          ];

          toolbar.className = "syw-markdown-toolbar";
          actions.forEach(function (action) {
            var button = document.createElement("button");
            button.type = "button";
            button.textContent = action[1];
            button.title = action[2];
            button.setAttribute("aria-label", action[2]);
            button.addEventListener("click", function () {
              if (action[0] === "heading") insertLinePrefix(textarea, "## ");
              if (action[0] === "bold") insertMarkdown(textarea, "**", "**", "굵은 글씨");
              if (action[0] === "italic") insertMarkdown(textarea, "*", "*", "기울임 글씨");
              if (action[0] === "quote") insertLinePrefix(textarea, "> ");
              if (action[0] === "code") insertMarkdown(textarea, "`", "`", "code");
              if (action[0] === "link") insertMarkdown(textarea, "[", "](https://)", "링크");
              if (action[0] === "ul") insertLinePrefix(textarea, "- ");
              if (action[0] === "ol") insertLinePrefix(textarea, "1. ");
              updatePreview(textarea, preview, true);
            });
            toolbar.appendChild(button);
          });

          return toolbar;
        }

        function buildPreview() {
          var preview = document.createElement("div");
          preview.className = "syw-markdown-preview";
          preview.innerHTML = '<div class="syw-markdown-preview-title">미리보기</div><div class="syw-markdown-preview-body"></div>';
          return preview;
        }

        function updatePreview(textarea, preview, forceVisible) {
          var value = textarea.value || "";
          var body = preview.querySelector(".syw-markdown-preview-body");

          if (forceVisible || value.trim()) {
            preview.classList.add("is-visible");
          } else {
            preview.classList.remove("is-visible");
          }

          body.innerHTML = value.trim() ? renderMarkdown(value) : "<p>작성 중인 댓글이 여기에 미리 표시됩니다.</p>";
        }

        function enhanceMarkdownEditors() {
          document.querySelectorAll("textarea").forEach(function (textarea) {
            var preview;
            var toolbar;

            if (textarea.dataset.sywMarkdownEnhanced === "true") {
              return;
            }

            textarea.dataset.sywMarkdownEnhanced = "true";
            preview = buildPreview();
            toolbar = buildToolbar(textarea, preview);

            textarea.parentNode.insertBefore(toolbar, textarea);
            textarea.parentNode.insertBefore(preview, textarea.nextSibling);
            textarea.addEventListener("input", function () {
              updatePreview(textarea, preview, false);
            });
            updatePreview(textarea, preview, false);
          });
        }

        function getMarkdownPreview(textarea) {
          var node = textarea.nextElementSibling;

          while (node) {
            if (node.classList && node.classList.contains("syw-markdown-preview")) {
              return node;
            }
            node = node.nextElementSibling;
          }

          return textarea.parentNode ? textarea.parentNode.querySelector(".syw-markdown-preview") : null;
        }

        function syncMarkdownPreviews() {
          document.querySelectorAll("textarea[data-syw-markdown-enhanced='true']").forEach(function (textarea) {
            var preview = getMarkdownPreview(textarea);

            if (preview) {
              updatePreview(textarea, preview, false);
            }
          });
        }

        function getActiveCommentText() {
          var active = document.activeElement;
          if (active && active.tagName === "TEXTAREA" && active.value.trim()) {
            return active.value;
          }

          var textareas = Array.prototype.slice.call(document.querySelectorAll("textarea"));
          var filled = textareas.reverse().find(function (textarea) {
            return textarea.value.trim();
          });

          return filled ? filled.value : "";
        }

        function clickSendButton() {
          var buttons = Array.prototype.slice.call(document.querySelectorAll("button"));
          var sendButton = buttons.find(function (button) {
            return (button.textContent || "").trim() === "보내기" && !button.disabled;
          });

          if (sendButton) {
            sendButton.click();
            return true;
          }

          return false;
        }

        function restorePendingComment() {
          var pending = readPendingComment();
          var autoSubmitting = storageGet(AUTO_SUBMITTING_KEY) === "true";
          var textarea;

          if (!pending || !autoSubmitting) {
            return;
          }

          textarea = document.querySelector("textarea");
          if (!textarea) {
            return;
          }

          if (!textarea.value.trim()) {
            textarea.value = pending;
            dispatchTextInput(textarea);
          }

          storageRemove(AUTO_SUBMITTING_KEY);
          storageRemove(PENDING_COMMENT_KEY);
          setTimeout(clickSendButton, 120);
        }

        function installSubmitFlow() {
          if (document.body.dataset.sywSubmitFlowInstalled === "true") {
            return;
          }

          document.body.dataset.sywSubmitFlowInstalled = "true";
          document.addEventListener("click", function (event) {
            var button = event.target.closest("button");
            var text;

            if (!button) {
              return;
            }

            text = (button.textContent || "").trim();

            if (text === "보내기") {
              storageRemove(AUTO_SUBMITTING_KEY);
              storageRemove(PENDING_COMMENT_KEY);
            }

            if (text === "이 이름으로 남기기" || button.classList.contains("auth-submit")) {
              var pending = getActiveCommentText() || readPendingComment();
              if (pending.trim()) {
                savePendingComment(pending);
                storageSet(AUTO_SUBMITTING_KEY, "true");
              } else {
                storageRemove(AUTO_SUBMITTING_KEY);
                storageRemove(PENDING_COMMENT_KEY);
              }
            }
          }, true);
        }

        var customizeScheduled = false;
        var customizeAttempts = 0;
        var customizeTimer = null;

        function customizeRemarkUi() {
          trimTimeSuffix();
          updateCommentPlaceholder();
          hideMarkdownNotice();
          hidePreviewButtons();
          hideDeletedComments();
          renameAuthControls();
          renameAnonymousTitle();
          syncNameSetupPanel();
          enhanceMarkdownEditors();
          syncMarkdownPreviews();
          installSubmitFlow();
          restorePendingComment();
        }

        function scheduleCustomizeRemarkUi() {
          if (customizeScheduled) {
            return;
          }

          customizeScheduled = true;
          window.requestAnimationFrame(function () {
            customizeScheduled = false;
            customizeRemarkUi();
          });
        }

        function startCustomizeRetryLoop() {
          if (customizeTimer) {
            return;
          }

          customizeTimer = window.setInterval(function () {
            customizeAttempts += 1;
            customizeRemarkUi();

            if (customizeAttempts >= 80) {
              window.clearInterval(customizeTimer);
              customizeTimer = null;
            }
          }, 250);
        }

        document.addEventListener("DOMContentLoaded", function () {
          customizeRemarkUi();
          startCustomizeRetryLoop();
          new MutationObserver(scheduleCustomizeRemarkUi).observe(document.body, {
            childList: true,
            characterData: true,
            subtree: true
          });
        });
      })();
    </script>
    <script>
      !function (e) {
        var d = e.head || e.body,
          n = e.createElement("script"),
          r = "noModule" in n;
        n.src = "remark" + (r ? ".mjs" : ".js"), r && (n.type = "module"), n.async = !0, n.defer = !0, d.appendChild(n)
      }(document)
    </script>
